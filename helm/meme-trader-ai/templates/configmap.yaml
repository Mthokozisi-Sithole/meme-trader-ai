apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "meme-trader-ai.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "meme-trader-ai.labels" . | nindent 4 }}
data:
  SIGNAL_REFRESH_INTERVAL_SECONDS: "{{ .Values.env.signalRefreshInterval }}"
  COINGECKO_MAX_PAGES: "{{ .Values.env.coingeckoMaxPages }}"
  DEBUG: "false"
  INTERNAL_API_URL: "http://{{ include "meme-trader-ai.fullname" . }}-api:8000"
