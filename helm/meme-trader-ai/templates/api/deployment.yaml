apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "meme-trader-ai.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "meme-trader-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.replicaCount.api }}
  selector:
    matchLabels:
      {{- include "meme-trader-ai.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "meme-trader-ai.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
        app: {{ include "meme-trader-ai.fullname" . }}-api
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "meme-trader-ai.serviceAccountName" . }}
      initContainers:
        - name: wait-for-db
          image: busybox
          command:
            - /bin/sh
            - -c
            - |
              until nc -z {{ include "meme-trader-ai.fullname" . }}-postgres 5432; do
                echo "Waiting for postgres...";
                sleep 2;
              done;
              echo "Postgres is ready."
      containers:
        - name: api
          image: "{{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}"
          imagePullPolicy: {{ .Values.image.api.pullPolicy }}
          command:
            - /bin/sh
            - -c
          args:
            - "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "meme-trader-ai.fullname" . }}-secrets
            - configMapRef:
                name: {{ include "meme-trader-ai.fullname" . }}-config
          resources:
            {{- toYaml .Values.resources.api | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
