apiVersion: v1
kind: Service
metadata:
  name: {{ include "meme-trader-ai.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "meme-trader-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "meme-trader-ai.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
