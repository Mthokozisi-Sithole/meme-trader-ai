apiVersion: v1
kind: Secret
metadata:
  name: {{ include "meme-trader-ai.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "meme-trader-ai.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://{{ .Values.postgres.username }}:{{ .Values.postgres.password }}@{{ include "meme-trader-ai.fullname" . }}-postgres:5432/{{ .Values.postgres.database }}"
  REDIS_URL: "redis://{{ include "meme-trader-ai.fullname" . }}-redis:6379/0"
  COINGECKO_API_KEY: "{{ .Values.env.coingeckoApiKey }}"
  BIRDEYE_API_KEY: "{{ .Values.env.birdeyeApiKey }}"
  MORALIS_API_KEY: "{{ .Values.env.moralisApiKey }}"
  BITQUERY_API_KEY: "{{ .Values.env.bitqueryApiKey }}"
  ALCHEMY_API_KEY: "{{ .Values.env.alchemyApiKey }}"
